name: build-prebuilt

# Builds the `kg` engine and bundles the native libkuzu for each platform, then attaches
# them to the GitHub Release. install.sh downloads these (KG_RELEASE_BASE defaults to this
# repo's latest release), so end users need neither Go nor a C compiler.
#
# Native runners only (no CGO cross-compile): each job builds on its own architecture and
# fetch-libs.sh pulls the matching prebuilt libkuzu. macOS is intentionally not built yet —
# it needs @loader_path rpath + a DYLD-aware shim; see README "Roadmap".

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            arch: x86_64
            goarch: amd64
          - runner: ubuntu-24.04-arm
            arch: aarch64
            goarch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Fetch native lib + binding
        run: bash scripts/fetch-libs.sh

      - name: Build kg
        working-directory: src
        env:
          CGO_ENABLED: '1'
        run: |
          go build -ldflags="-extldflags '-Wl,-rpath,\$ORIGIN/../lib'" -o kg .

      - name: Smoke test the binary
        run: |
          LD_LIBRARY_PATH="third_party/go-kuzu/lib/dynamic/linux-${{ matrix.goarch }}" \
            src/kg version

      - name: Stage artifacts
        run: |
          mkdir -p dist
          cp src/kg "dist/kg-linux-${{ matrix.arch }}"
          cp "third_party/go-kuzu/lib/dynamic/linux-${{ matrix.goarch }}/libkuzu.so" \
             "dist/libkuzu-linux-${{ matrix.arch }}.so"
          ls -la dist

      - name: Attach to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*

      - name: Upload as workflow artifact
        if: github.event_name != 'release'
        uses: actions/upload-artifact@v4
        with:
          name: kg-linux-${{ matrix.arch }}
          path: dist/*

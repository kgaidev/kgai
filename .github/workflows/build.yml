name: build-prebuilt

# Builds the `kg` engine + bundles the native libkuzu for each platform and attaches
# them to the GitHub Release. install.sh consumes these when KG_RELEASE_BASE points at
# the release's download base, so end users need neither Go nor a C compiler.

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            asset_arch: x86_64
          - os: macos-latest
            goos: darwin
            goarch: arm64
            asset_arch: aarch64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Fetch native lib + binding
        run: bash scripts/fetch-libs.sh

      - name: Build kg
        working-directory: src
        env:
          CGO_ENABLED: '1'
        run: |
          go build -ldflags="-extldflags '-Wl,-rpath,\$ORIGIN/../lib'" -o kg .

      - name: Stage artifacts
        run: |
          mkdir -p dist
          cp src/kg "dist/kg-${{ matrix.goos }}-${{ matrix.asset_arch }}"
          libsub="${{ matrix.goos }}-${{ matrix.goarch }}"
          cp third_party/go-kuzu/lib/dynamic/$libsub/libkuzu.* \
             "dist/libkuzu-${{ matrix.goos }}-${{ matrix.asset_arch }}.so"

      - name: Upload to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*

      - name: Upload as workflow artifact
        if: github.event_name != 'release'
        uses: actions/upload-artifact@v4
        with:
          name: kg-${{ matrix.goos }}-${{ matrix.asset_arch }}
          path: dist/*

name: build-prebuilt

# Builds the `kg` engine and bundles the native libkuzu for each platform, then attaches
# them to the GitHub Release. install.sh downloads these (KG_RELEASE_BASE defaults to this
# repo's latest release), so end users need neither Go nor a C compiler.
#
# Native runners (no CGO cross-compile) — except darwin-x86_64, which is cross-built on
# the arm64 macOS runner (Apple clang multi-arch) against the universal libkuzu dylib and
# smoke-tested under Rosetta.
#
# The release is created exactly once (prepare-release) before any artifacts exist; the
# matrix jobs only upload. This removes the create-race that failed the v0.1.7 arm build.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prepare-release:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Create release (idempotent)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 || \
            gh release create "$GITHUB_REF_NAME" --verify-tag --generate-notes

  build:
    needs: [prepare-release]
    if: ${{ !cancelled() && (needs.prepare-release.result == 'success' || needs.prepare-release.result == 'skipped') }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            os: linux
            arch: x86_64
            libdir: linux-amd64
          - runner: ubuntu-24.04-arm
            os: linux
            arch: aarch64
            libdir: linux-arm64
          - runner: macos-14
            os: darwin
            arch: arm64
            libdir: darwin
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: 'src/go.mod'
          cache-dependency-path: src/go.sum

      - name: Fetch native lib + binding
        run: bash scripts/fetch-libs.sh

      - name: Build kg
        working-directory: src
        env:
          CGO_ENABLED: '1'
        run: |
          if [ "${{ matrix.os }}" = "darwin" ]; then
            go build -ldflags="-extldflags '-Wl,-rpath,@loader_path/../lib'" -o kg .
          else
            go build -ldflags="-extldflags '-Wl,-rpath,\$ORIGIN/../lib'" -o kg .
          fi

      # Intel Macs get a cross-built binary from the same runner: Apple clang compiles
      # both arches and the kuzu dylib is universal.
      - name: Build kg (darwin x86_64 cross)
        if: matrix.os == 'darwin'
        working-directory: src
        env:
          CGO_ENABLED: '1'
          GOARCH: amd64
          CC: cc -arch x86_64
        run: |
          go build -ldflags="-extldflags '-Wl,-rpath,@loader_path/../lib'" -o kg-x86_64 .

      - name: Smoke test
        run: |
          if [ "${{ matrix.os }}" = "darwin" ]; then
            DYLD_LIBRARY_PATH="third_party/go-kuzu/lib/dynamic/darwin" src/kg version
            DYLD_LIBRARY_PATH="third_party/go-kuzu/lib/dynamic/darwin" arch -x86_64 src/kg-x86_64 version
          else
            LD_LIBRARY_PATH="third_party/go-kuzu/lib/dynamic/${{ matrix.libdir }}" src/kg version
          fi

      - name: Stage artifacts
        run: |
          mkdir -p dist
          if [ "${{ matrix.os }}" = "darwin" ]; then
            cp src/kg dist/kg-darwin-arm64
            cp src/kg-x86_64 dist/kg-darwin-x86_64
            cp third_party/go-kuzu/lib/dynamic/darwin/libkuzu.dylib dist/libkuzu-darwin-universal.dylib
          else
            cp src/kg "dist/kg-${{ matrix.os }}-${{ matrix.arch }}"
            cp "third_party/go-kuzu/lib/dynamic/${{ matrix.libdir }}/libkuzu.so" \
               "dist/libkuzu-${{ matrix.os }}-${{ matrix.arch }}.so"
          fi
          ls -la dist

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$GITHUB_REF_NAME" dist/* --clobber

      # Manual (workflow_dispatch) runs just publish artifacts for inspection.
      - name: Upload as workflow artifact
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: kg-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/*

name: build-prebuilt

# Builds the `kg` engine and bundles the native libkuzu for each platform, then attaches
# them to the GitHub Release. install.sh downloads these (KG_RELEASE_BASE defaults to this
# repo's latest release), so end users need neither Go nor a C compiler.
#
# Native runners only (no CGO cross-compile): each job builds on its own architecture and
# fetch-libs.sh pulls the matching prebuilt libkuzu. macOS is intentionally not built yet —
# it needs @loader_path rpath + a DYLD-aware shim; see README "Roadmap".

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            arch: x86_64
            goarch: amd64
          - runner: ubuntu-24.04-arm
            arch: aarch64
            goarch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: 'src/go.mod'
          cache-dependency-path: src/go.sum

      - name: Fetch native lib + binding
        run: bash scripts/fetch-libs.sh

      - name: Build kg
        working-directory: src
        env:
          CGO_ENABLED: '1'
        run: |
          go build -ldflags="-extldflags '-Wl,-rpath,\$ORIGIN/../lib'" -o kg .

      - name: Smoke test the binary
        run: |
          LD_LIBRARY_PATH="third_party/go-kuzu/lib/dynamic/linux-${{ matrix.goarch }}" \
            src/kg version

      - name: Stage artifacts
        run: |
          mkdir -p dist
          cp src/kg "dist/kg-linux-${{ matrix.arch }}"
          cp "third_party/go-kuzu/lib/dynamic/linux-${{ matrix.goarch }}/libkuzu.so" \
             "dist/libkuzu-linux-${{ matrix.arch }}.so"
          ls -la dist

      # On a tag push, create/attach the release with the built binaries.
      - name: Create release + attach binaries
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          generate_release_notes: true
          make_latest: true

      # Manual (workflow_dispatch) runs just publish artifacts for inspection.
      - name: Upload as workflow artifact
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: kg-linux-${{ matrix.arch }}
          path: dist/*
